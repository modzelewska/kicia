<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Koty</title>

<style>
body{
    margin:0;
    font-family: "Century Gothic", CenturyGothic, Arial, sans-serif;
    background-color:#f6c6d3; /* jasny pudrowy róż */
    color:#333;
    text-align:center;
}

h1{
    font-size:50px;
    margin-top:40px;
}

h2{
    margin-top:30px;
}

.container{
    width:70%;
    margin:auto;
    padding:30px;
}

.koty{
    font-size:60px;
    margin:20px;
}

.box{
    background:rgba(255,255,255,0.5);
    padding:25px;
    margin:30px auto;
    border-radius:20px;
}

button{
    font-family:"Century Gothic", CenturyGothic, Arial, sans-serif;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:white;
}

button:hover{
    background:#ffe4ec;
}
</style>

</head>

<body>

<h1>🐱 Strona o Kotach</h1>

<div class="container">

<div class="koty">
🐈 🐈‍⬛ 😺 😸
</div>

<div class="box">
<h2>Dlaczego koty są świetne?</h2>
<p>
• są miękkie i puchate<br>
• lubią spać cały dzień<br>
• czasem biegają po domu bez powodu
</p>
</div>

<div class="box">
<h2>Ciekawostka</h2>
<p>Koty potrafią skoczyć nawet kilka razy wyżej niż ich własna wysokość!</p>
</div>

<button onclick="alert('Miau! 🐱')">Kliknij kota</button>

</div>

</body>
</html>
